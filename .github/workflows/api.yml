name: FastAPI App

on:
  push:
    branches: [master]
    paths:
      - backend/**
      - pyproject.toml
      - README.md
      - .github/workflows/api.yml
  pull_request:
    branches: [master]
    paths:
      - backend/**
      - pyproject.toml
      - README.md
      - .github/workflows/api.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Formatting check
        run: ruff format --check .
      - name: Lint check
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      SECRET_KEY: ci-test-secret-key
      LAMBDA_API_KEY: ci-test-lambda-key
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: test_db
      S3_BUCKET_NAME: test-bucket
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: rusxl
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: rusxl/epam-project-management:latest
